<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday Rose</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css?family=Kaushan+Script"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Bangers"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- <div id="countdownGate" class="countdown-gate">
      <div class="time-to">
        Your reward unlocks in...
        <span id="countdownTimer">&nbsp;</span>
      </div>
    </div> -->

    <main id="birthdayStage" class="birthday-stage is-hidden">
      <div class="moon">
        <div class="crater1"></div>
        <div class="crater2"></div>
        <div class="crater3"></div>
      </div>

      <canvas id="canvas"></canvas>
      <div id="sea"></div>
      <div id="beach"></div>
      <img
        src="https://dl.dropbox.com/s/2k0mtrxc2dqurmh/jumping.png"
        alt="jumping people"
        id="people"
      />

      <div id="merrywrap" class="merrywrap">
        <h1 class="reward-title">Here is your Reward</h1>

        <button class="giftbox" type="button" aria-label="Open birthday gift">
          <span class="cover">
            <span></span>
          </span>
          <span class="box"></span>
        </button>

        <div class="icons" aria-label="Happy Birthday Rose">
          <div class="row">
            <span>H</span>
            <span>a</span>
            <span>p</span>
            <span>p</span>
            <span>y</span>
          </div>
          <div class="row">
            <span>B</span>
            <span>i</span>
            <span>r</span>
            <span>t</span>
            <span>h</span>
            <span>d</span>
            <span>a</span>
            <span>y</span>
          </div>
          <div class="row">
            <span>R</span>
            <span>o</span>
            <span>s</span>
            <span>e</span>
          </div>
        </div>
      </div>

      <div id="video"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
